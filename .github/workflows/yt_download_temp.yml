name: Temp Video Downloader
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL'
        required: true
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
      - name: Download Video
        run: yt-dlp -f "best[ext=mp4]/best" --no-check-certificates "${{ github.event.inputs.url }}" -o "video.mp4"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-file
          path: video.mp4
